name: CI/CD - Cars Dealership

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test-django:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - run: pip install flake8
      - run: flake8 djangoapp djangoproj --max-line-length=120
      - run: python manage.py test djangoapp

  lint-and-test-node:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: database
    services:
      mongo:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.runCommand({ping:1})'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      MONGO_URI: mongodb://localhost:27017/dealershipsDB_test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm install
      - run: npx eslint . --ext .js || true
      - run: npm test

  test-sentiment:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sentiment_analyzer
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - run: python -m nltk.downloader vader_lexicon
      - run: pytest -v

  build-and-test-frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm install
      - run: CI=true npm test -- --watchAll=false
      - run: npm run build

  build-and-push-images:
    needs: [lint-and-test-django, lint-and-test-node, test-sentiment, build-and-test-frontend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [server, database, sentiment_analyzer, frontend]
        include:
          - service: server
            image: cars-dealership-django
          - service: database
            image: cars-dealership-node
          - service: sentiment_analyzer
            image: cars-dealership-sentiment
          - service: frontend
            image: cars-dealership-frontend
    steps:
      - uses: actions/checkout@v4

      - name: Check IBM registry secrets
        id: registry_secrets
        env:
          IBM_CLOUD_API_KEY: ${{ secrets.IBM_CLOUD_API_KEY }}
          ICR_REGISTRY: ${{ secrets.ICR_REGISTRY }}
          ICR_NAMESPACE: ${{ secrets.ICR_NAMESPACE }}
        run: |
          if [ -n "$IBM_CLOUD_API_KEY" ] && [ -n "$ICR_REGISTRY" ] && [ -n "$ICR_NAMESPACE" ]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "IBM Cloud registry secrets are not configured; skipping image build and push."
          fi

      - name: Log in to IBM Cloud Container Registry
        if: steps.registry_secrets.outputs.configured == 'true'
        env:
          IBM_CLOUD_API_KEY: ${{ secrets.IBM_CLOUD_API_KEY }}
          ICR_REGISTRY: ${{ secrets.ICR_REGISTRY }}
        run: |
          echo "$IBM_CLOUD_API_KEY" | docker login -u iamapikey --password-stdin "$ICR_REGISTRY"

      - name: Build image
        if: steps.registry_secrets.outputs.configured == 'true'
        env:
          ICR_REGISTRY: ${{ secrets.ICR_REGISTRY }}
          ICR_NAMESPACE: ${{ secrets.ICR_NAMESPACE }}
        run: |
          docker build -t "$ICR_REGISTRY/$ICR_NAMESPACE/${{ matrix.image }}:${{ github.sha }}" ./${{ matrix.service }}

      - name: Push image
        if: steps.registry_secrets.outputs.configured == 'true'
        env:
          ICR_REGISTRY: ${{ secrets.ICR_REGISTRY }}
          ICR_NAMESPACE: ${{ secrets.ICR_NAMESPACE }}
        run: |
          docker push "$ICR_REGISTRY/$ICR_NAMESPACE/${{ matrix.image }}:${{ github.sha }}"

  deploy-to-code-engine:
    needs: build-and-push-images
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check IBM deployment secrets
        id: deployment_secrets
        env:
          IBM_CLOUD_API_KEY: ${{ secrets.IBM_CLOUD_API_KEY }}
          IBM_CLOUD_REGION: ${{ secrets.IBM_CLOUD_REGION }}
          ICR_REGISTRY: ${{ secrets.ICR_REGISTRY }}
          ICR_NAMESPACE: ${{ secrets.ICR_NAMESPACE }}
          CODE_ENGINE_PROJECT: ${{ secrets.CODE_ENGINE_PROJECT }}
        run: |
          if [ -n "$IBM_CLOUD_API_KEY" ] && [ -n "$IBM_CLOUD_REGION" ] && [ -n "$ICR_REGISTRY" ] && [ -n "$ICR_NAMESPACE" ] && [ -n "$CODE_ENGINE_PROJECT" ]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "IBM Cloud deployment secrets are not configured; skipping Code Engine deployment."
          fi

      - name: Install IBM Cloud CLI + Code Engine plugin
        if: steps.deployment_secrets.outputs.configured == 'true'
        run: |
          curl -fsSL https://clis.cloud.ibm.com/install/linux | sh
          ibmcloud plugin install code-engine -f

      - name: Log in to IBM Cloud
        if: steps.deployment_secrets.outputs.configured == 'true'
        env:
          IBM_CLOUD_API_KEY: ${{ secrets.IBM_CLOUD_API_KEY }}
          IBM_CLOUD_REGION: ${{ secrets.IBM_CLOUD_REGION }}
          CODE_ENGINE_PROJECT: ${{ secrets.CODE_ENGINE_PROJECT }}
        run: |
          ibmcloud login --apikey "$IBM_CLOUD_API_KEY" -r "$IBM_CLOUD_REGION"
          ibmcloud ce project select --name "$CODE_ENGINE_PROJECT"

      - name: Deploy each service revision
        if: steps.deployment_secrets.outputs.configured == 'true'
        env:
          ICR_REGISTRY: ${{ secrets.ICR_REGISTRY }}
          ICR_NAMESPACE: ${{ secrets.ICR_NAMESPACE }}
        run: |
          ibmcloud ce app update --name sentiment-analyzer --image "$ICR_REGISTRY/$ICR_NAMESPACE/cars-dealership-sentiment:${{ github.sha }}"
          ibmcloud ce app update --name node-app --image "$ICR_REGISTRY/$ICR_NAMESPACE/cars-dealership-node:${{ github.sha }}"
          ibmcloud ce app update --name django-app --image "$ICR_REGISTRY/$ICR_NAMESPACE/cars-dealership-django:${{ github.sha }}"
          ibmcloud ce app update --name frontend --image "$ICR_REGISTRY/$ICR_NAMESPACE/cars-dealership-frontend:${{ github.sha }}"
