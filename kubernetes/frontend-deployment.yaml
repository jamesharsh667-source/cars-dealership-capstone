apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: cars-dealership
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: <YOUR_REGISTRY>/cars-dealership-frontend:latest
          ports:
            - containerPort: 80
          env:
            # Overrides the image's default "django_app:8000" (a Docker
            # Compose service name) with the k8s Service name below, which
            # uses a hyphen since k8s service names can't have underscores.
            - name: DJANGO_UPSTREAM
              value: "django-app:8000"
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "250m"
              memory: "256Mi"
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: cars-dealership
spec:
  selector:
    app: frontend
  ports:
    - port: 80
      targetPort: 80
  type: LoadBalancer
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: cars-dealership-ingress
  namespace: cars-dealership
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  rules:
    - host: cars-dealership.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 80
          - path: /djangoapp
            pathType: Prefix
            backend:
              service:
                name: django-app
                port:
                  number: 8000
