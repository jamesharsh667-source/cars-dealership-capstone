apiVersion: apps/v1
kind: Deployment
metadata:
  name: node-app
  namespace: cars-dealership
spec:
  replicas: 2
  selector:
    matchLabels:
      app: node-app
  template:
    metadata:
      labels:
        app: node-app
    spec:
      containers:
        - name: node-app
          image: <YOUR_REGISTRY>/cars-dealership-node:latest
          ports:
            - containerPort: 3030
          env:
            - name: MONGO_URI
              value: mongodb://mongo-db:27017/dealershipsDB
            - name: SENTIMENT_URL
              value: http://sentiment-analyzer:5050/analyze/
            - name: PORT
              value: "3030"
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "250m"
              memory: "256Mi"
          readinessProbe:
            httpGet:
              path: /
              port: 3030
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 3030
            initialDelaySeconds: 15
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: node-app
  namespace: cars-dealership
spec:
  selector:
    app: node-app
  ports:
    - port: 3030
      targetPort: 3030
