apiVersion: apps/v1
kind: Deployment
metadata:
  name: django-app
  namespace: cars-dealership
spec:
  replicas: 2
  selector:
    matchLabels:
      app: django-app
  template:
    metadata:
      labels:
        app: django-app
    spec:
      containers:
        - name: django-app
          image: <YOUR_REGISTRY>/cars-dealership-django:latest
          ports:
            - containerPort: 8000
          env:
            - name: DJANGO_DEBUG
              value: "False"
            - name: DJANGO_ALLOWED_HOSTS
              value: "*"
            - name: BACKEND_URL
              value: http://node-app:3030
            - name: SENTIMENT_ANALYZER_URL
              value: http://sentiment-analyzer:5050
            - name: DJANGO_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: django-secrets
                  key: secret-key
          resources:
            requests:
              cpu: "150m"
              memory: "256Mi"
            limits:
              cpu: "400m"
              memory: "512Mi"
          readinessProbe:
            httpGet:
              path: /djangoapp/health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /djangoapp/health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: django-app
  namespace: cars-dealership
spec:
  selector:
    app: django-app
  ports:
    - port: 8000
      targetPort: 8000
  type: ClusterIP
---
apiVersion: v1
kind: Secret
metadata:
  name: django-secrets
  namespace: cars-dealership
type: Opaque
stringData:
  secret-key: "CHANGE_ME_IN_PRODUCTION"
