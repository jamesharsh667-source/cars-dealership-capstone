version: "3.9"

services:
  mongo_db:
    image: mongo:7
    container_name: mongo_db
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  sentiment_analyzer:
    build: ./sentiment_analyzer
    container_name: sentiment_analyzer
    ports:
      - "5050:5050"

  node_app:
    build: ./database
    container_name: node_app
    environment:
      MONGO_URI: mongodb://mongo_db:27017/dealershipsDB
      SENTIMENT_URL: http://sentiment_analyzer:5050/analyze/
      PORT: 3030
    ports:
      - "3030:3030"
    depends_on:
      - mongo_db
      - sentiment_analyzer

  django_app:
    build: ./server
    container_name: django_app
    environment:
      DJANGO_DEBUG: "False"
      DJANGO_ALLOWED_HOSTS: "*"
      BACKEND_URL: http://node_app:3030
      SENTIMENT_ANALYZER_URL: http://sentiment_analyzer:5050
    ports:
      - "8000:8000"
    depends_on:
      - node_app
      - sentiment_analyzer

  frontend:
    build:
      context: ./frontend
      # REACT_APP_API_BASE defaults to the relative "/djangoapp" (see
      # frontend/Dockerfile) — nginx proxies that to django_app below,
      # so the browser only ever talks to one origin: localhost:3000.
    container_name: frontend
    environment:
      DJANGO_UPSTREAM: django_app:8000
    ports:
      - "3000:80"
    depends_on:
      - django_app

volumes:
  mongo_data:
